# ============================================================
# SISPARDT - Docker Compose: Observabilidad
# Prometheus + Grafana + postgres_exporter + node-exporter
#
# Uso:
#   docker compose -f docker-compose.monitoring.yml up -d
#
# Accesos:
#   Grafana:    http://localhost:3000  (admin / ver GRAFANA_PASSWORD en .env)
#   Prometheus: http://localhost:9090
# ============================================================

name: sispardt-monitoring

services:

  # ----------------------------------------------------------
  # Prometheus — recolección de métricas
  # Scraping: Traefik, Go services, PostgreSQL exporters, Keycloak, Kafka
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: sispardt-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - sispardt-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ----------------------------------------------------------
  # Grafana — visualización de métricas y dashboards
  # Provisioning automático: datasources + dashboards
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: sispardt-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-Grafana_Dev2026!}"
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         "http://localhost:3000"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Provisioning automático
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - sispardt-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------
  # PostgreSQL Exporter — métricas de BD Establecimientos
  # ----------------------------------------------------------
  postgres-exporter-est:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: sispardt-pg-exporter-est
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://app_resp_estadistica:${APP_PASS_ESTAD}@db-establecimientos:5432/sispardt_establecimientos?sslmode=disable"
      PG_EXPORTER_DISABLE_DEFAULT_METRICS: "false"
      PG_EXPORTER_DISABLE_SETTINGS_METRICS: "false"
    networks:
      - sispardt-net

  # ----------------------------------------------------------
  # PostgreSQL Exporter — métricas de BD Movimientos
  # ----------------------------------------------------------
  postgres-exporter-mov:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: sispardt-pg-exporter-mov
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://app_resp_estadistica:${APP_PASS_ESTAD}@db-movimientos:5432/sispardt_movimientos?sslmode=disable"
    networks:
      - sispardt-net

  # ----------------------------------------------------------
  # Node Exporter — métricas del sistema host (CPU, RAM, disco)
  # ----------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: sispardt-node-exporter
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    networks:
      - sispardt-net

# ----------------------------------------------------------
# Volumes
# ----------------------------------------------------------
volumes:
  prometheus-data:
    name: sispardt-prometheus-data
  grafana-data:
    name: sispardt-grafana-data

# ----------------------------------------------------------
# Red compartida
# ----------------------------------------------------------
networks:
  sispardt-net:
    external: true
    name: sispardt-net
