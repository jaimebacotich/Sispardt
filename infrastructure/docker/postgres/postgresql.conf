# ============================================================
# SISPARDT - PostgreSQL 17.2 Configuration
# ============================================================

# --- Conexiones ---
listen_addresses = '*'
max_connections = 200
superuser_reserved_connections = 3

# --- Memoria ---
shared_buffers = 256MB
work_mem = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 768MB

# --- WAL y Replicacion Logica (requerido por Debezium) ---
wal_level = logical
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 256MB
wal_compression = on

# --- Checkpoint ---
checkpoint_completion_target = 0.9
min_wal_size = 80MB
max_wal_size = 1GB

# --- Planner ---
default_statistics_target = 100
random_page_cost = 1.1

# --- Logging ---
log_timezone = 'America/La_Paz'
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0

# --- Locale ---
# Alpine (musl libc) solo soporta C y POSIX para locales de sistema.
# El formateo regional se maneja en la capa de aplicacion (Go/React).
timezone = 'America/La_Paz'
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
datestyle = 'iso, dmy'
default_text_search_config = 'pg_catalog.spanish'

# --- Seguridad ---
ssl = off

# --- Autovacuum ---
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
