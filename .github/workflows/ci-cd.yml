# ============================================================
# SISPARDT вЂ” CI/CD Pipeline (DevSecOps)
# Runner: self-hosted (misma VM que k3s)
# Registry: ghcr.io
#
# Etapas de seguridad:
#   1. Secrets scan     вЂ” Gitleaks (detecta credenciales en el cГіdigo)
#   2. SAST Go          вЂ” gosec para servicios Go
#   3. SAST Semgrep     вЂ” reglas Go + TypeScript multi-lenguaje
#   4. Quality/SCA      вЂ” ESLint (bloquea) + npm audit (informativo)
#   5. Build + SCA FS   вЂ” Trivy FS (dependencias) antes del build
#   6. Image scan       вЂ” Trivy (CVEs en imГЎgenes Docker, bloquea en CRITICAL)
#   7. Deploy           вЂ” kubectl apply a k3s
#   8. Smoke Test       вЂ” validaciГіn HTTP post-deploy
#   9. DAST             вЂ” OWASP ZAP Baseline contra la app desplegada
# ============================================================
#
# SECRETS requeridos en GitHub в†’ Settings в†’ Secrets в†’ Actions:
#
#   ENV_FILE              Contenido completo del archivo .env (nunca commitear el .env)
#   GHCR_PAT              Personal Access Token con scope read:packages y write:packages
#   APP_PASS_RESP_REG     ContraseГ±a del usuario PostgreSQL app_responsable_registro (establecimientos)
#   APP_PASS_RECEP        ContraseГ±a del usuario PostgreSQL app_recepcionista (movimientos)
#   APP_PASS_ESTAD        ContraseГ±a del usuario PostgreSQL app_resp_estadistica (movimientos)
#   APP_PASS_ADMIN        ContraseГ±a del usuario PostgreSQL app_admin_general (movimientos)
#   APP_PASS_AUD_SES      ContraseГ±a del usuario PostgreSQL app_auditoria_sesiones
#   KC_SECRET_EST_SVC     Keycloak client secret вЂ” sispardt-establecimientos-svc
#   KC_SECRET_MOV_SVC     Keycloak client secret вЂ” sispardt-movimientos-svc
#   KC_SECRET_AUD_SVC     Keycloak client secret вЂ” sispardt-auditoria-sesiones-svc
#   NEXTAUTH_SECRET       NextAuth session secret (mГ­nimo 32 caracteres)
#   DEFAULT_USER_PASSWORD ContraseГ±a inicial temporal para usuarios creados desde Personal
#
# NOTA: sispardt-web es cliente pГєblico en Keycloak (sin secret).
# ============================================================

name: CI/CD

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write
  security-events: write   # requerido por Trivy para subir resultados SARIF

env:
  REGISTRY: ghcr.io

jobs:
  # в”Ђв”Ђв”Ђ 1. Secrets Scan вЂ” Gitleaks в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  secrets-scan:
    name: "Security В· Secrets Scan (Gitleaks)"
    runs-on: self-hosted
    steps:
      - name: Checkout (historial completo para Gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar y ejecutar Gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz
          tar -xzf gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz gitleaks
          ./gitleaks detect --source . --verbose --no-git --config .gitleaks.toml
          rm -f gitleaks gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz

  # в”Ђв”Ђв”Ђ 2. SAST вЂ” gosec (servicios Go) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  sast-go:
    name: "Security В· SAST Go (gosec)"
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar gosec y analizar servicios Go
        run: |
          # Buscar go en rutas comunes
          for p in /usr/local/go/bin /usr/bin /snap/bin /usr/local/bin "$HOME/sdk/go/bin"; do
            [ -x "$p/go" ] && export PATH=$PATH:$p && break
          done
          # Si no estГЎ instalado, descargar go temporalmente
          if ! command -v go &>/dev/null; then
            echo "Go no encontrado вЂ” instalando temporalmente..."
            wget -q https://go.dev/dl/go1.22.4.linux-amd64.tar.gz -O /tmp/go.tar.gz
            mkdir -p "$HOME/.local"
            tar -xzf /tmp/go.tar.gz -C "$HOME/.local"
            export PATH=$PATH:$HOME/.local/go/bin
            rm /tmp/go.tar.gz
          fi
          go version
          export GOPATH=${GOPATH:-$HOME/go}
          export PATH=$PATH:$GOPATH/bin
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          $GOPATH/bin/gosec -fmt=text ./services/establecimientos/...
          $GOPATH/bin/gosec -fmt=text ./services/movimientos/...
          $GOPATH/bin/gosec -fmt=text ./services/kafka-consumer/...

  # в”Ђв”Ђв”Ђ 3. SAST вЂ” Semgrep (Go + TypeScript) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  sast-semgrep:
    name: "Security В· SAST Semgrep (Go + TypeScript)"
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar Semgrep (vГ­a Docker)
        run: |
          # Usar imagen oficial de Semgrep вЂ” no requiere pip/Python en el runner
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            semgrep/semgrep:latest \
            semgrep --config=p/golang \
              --error \
              /src/services/establecimientos \
              /src/services/movimientos \
              /src/services/kafka-consumer
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            semgrep/semgrep:latest \
            semgrep --config=p/typescript \
              --error \
              /src/frontend/src

  # в”Ђв”Ђв”Ђ 4. Calidad + Audit вЂ” frontend в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  dependency-audit:
    name: "Quality В· ESLint + Dependency Audit (npm)"
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias, lint y auditar
        run: |
          node --version
          npm --version
          cd frontend && npm ci --ignore-scripts --legacy-peer-deps
          # AnГЎlisis de calidad вЂ” bloquea ante errores ESLint
          npm run lint
          # Auditar: informativo (las HIGH requieren breaking changes вЂ” next@16, registradas en logs)
          npm audit --legacy-peer-deps || true

  # в”Ђв”Ђв”Ђ 4. Build & Push в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  build:
    name: "Build В· ${{ matrix.service }}"
    runs-on: self-hosted
    needs: [secrets-scan, sast-go, sast-semgrep, dependency-audit]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: establecimientos
            context: services/establecimientos
          - service: movimientos
            context: services/movimientos
          - service: kafka-consumer
            context: services/kafka-consumer
          - service: auditoria-sesiones
            context: services/auditoria-sesiones
          - service: frontend
            context: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # в”Ђв”Ђ Trivy FS вЂ” SCA antes del build (dependencias del cГіdigo fuente) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: "Security В· SCA filesystem (Trivy FS)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./${{ matrix.context }}"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"          # bloquea ante CVEs crГ­ticos o altos en dependencias
          trivyignores: "./${{ matrix.context }}/.trivyignore"

      - name: Construir imagen Docker
        run: |
          docker build \
            -t $REGISTRY/${{ github.repository_owner }}/sispardt-${{ matrix.service }}:${{ github.sha }} \
            -t $REGISTRY/${{ github.repository_owner }}/sispardt-${{ matrix.service }}:latest \
            ./${{ matrix.context }}

      # в”Ђв”Ђ Trivy Image вЂ” escaneo de imagen Docker construida в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: "Security В· Escanear imagen con Trivy"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ github.repository_owner }}/sispardt-${{ matrix.service }}:${{ github.sha }}"
          format: "table"
          severity: "CRITICAL"
          exit-code: "1"          # bloquea ante CVEs crГ­ticos en la imagen final

      - name: Login a ghcr.io
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Push imagen (solo en tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker push $REGISTRY/${{ github.repository_owner }}/sispardt-${{ matrix.service }}:${{ github.sha }}
          docker push $REGISTRY/${{ github.repository_owner }}/sispardt-${{ matrix.service }}:latest

  # в”Ђв”Ђв”Ђ 6. Deploy a k3s в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  deploy:
    name: "Deploy в†’ k3s"
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # в”Ђв”Ђ Infraestructura Docker Compose в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Crear .env desde secreto
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: echo "$ENV_FILE_CONTENT" > $GITHUB_WORKSPACE/.env

      - name: Levantar infraestructura (Docker Compose)
        # Solo infraestructura вЂ” los servicios de app los maneja k3s exclusivamente
        # (evita conflicto de puerto 80 entre Traefik Docker y Traefik k3s)
        # || true: Keycloak puede fallar su healthcheck en el primer intento (JVM lenta);
        # el step siguiente espera activamente y falla si no llega a healthy.
        run: |
          docker compose -f $GITHUB_WORKSPACE/docker-compose.yml up -d --remove-orphans \
            db-establecimientos db-movimientos db-auditoria-sesiones db-keycloak keycloak keycloak-init \
            kafka debezium kafka-ui kafka-init svc-kafka-consumer \
            prometheus grafana node-exporter postgres-exporter-est postgres-exporter-mov \
            || true

      - name: Esperar que la infraestructura estГ© healthy
        run: |
          echo "Esperando que los servicios crГ­ticos estГ©n healthy..."
          FAILED=0
          for svc in sispardt-db-establecimientos sispardt-db-movimientos sispardt-db-auditoria-sesiones sispardt-keycloak; do
            echo -n "  в†’ $svc: "
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $svc 2>/dev/null || echo "missing")
              if [ "$STATUS" = "healthy" ]; then
                echo "healthy вњ“"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "TIMEOUT (Гєltimo estado: $STATUS)"
                FAILED=1
              fi
              sleep 10
            done
          done

          # DiagnГіstico en caso de fallo de Keycloak
          KC_STATUS=$(docker inspect --format='{{.State.Health.Status}}' sispardt-keycloak 2>/dev/null || echo "missing")
          if [ "$KC_STATUS" != "healthy" ]; then
            echo ""
            echo "=== LOGS sispardt-keycloak (Гєltimas 100 lГ­neas) ==="
            docker logs --tail 100 sispardt-keycloak 2>&1 || true
            echo "=== Estado del contenedor ==="
            docker inspect --format='ExitCode={{.State.ExitCode}} Status={{.State.Status}} Error={{.State.Error}}' sispardt-keycloak 2>/dev/null || true
          fi

          if [ $FAILED -eq 1 ]; then
            echo "ERROR: Uno o mГЎs servicios no alcanzaron estado healthy"
            exit 1
          fi

      # в”Ђв”Ђ Verificar y recuperar conector Debezium в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Verificar conector Debezium
        run: |
          echo "Esperando que kafka-init registre el conector..."
          for i in $(seq 1 12); do
            STATE=$(curl -sf http://localhost:8083/connectors/sispardt-establecimientos-source/status \
              | python3 -c "import sys,json; t=json.load(sys.stdin)['tasks']; print(t[0]['state'] if t else 'NO_TASKS')" 2>/dev/null || echo "NOT_READY")
            echo "  intento $i/12 вЂ” task state: $STATE"
            if [ "$STATE" = "RUNNING" ]; then
              echo "Conector Debezium OK вњ“"
              break
            fi
            if [ "$STATE" = "FAILED" ]; then
              echo "  Task FAILED вЂ” reiniciando..."
              curl -sf -X POST http://localhost:8083/connectors/sispardt-establecimientos-source/tasks/0/restart || true
            fi
            sleep 10
          done

      # в”Ђв”Ђ Obtener IP del nodo k3s (misma VM que Docker Compose) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Obtener IP del nodo
        id: node
        run: |
          IP=$(kubectl get nodes \
            -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' \
            | tr ' ' '\n' | grep -E '^[0-9]+\.' | head -1)
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "Node IP detectada: $IP"

      # в”Ђв”Ђ Namespace в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Aplicar namespace
        run: |
          # Esperar a que desaparezca si estГЎ en Terminating (puede tardar hasta ~60s)
          for i in $(seq 1 30); do
            STATUS=$(kubectl get namespace sispardt -o jsonpath='{.status.phase}' 2>/dev/null || echo "gone")
            if [ "$STATUS" = "Terminating" ]; then
              echo "  namespace sispardt en Terminating, esperando... ($i/30)"
              sleep 5
            else
              break
            fi
          done
          kubectl apply -f k8s/namespace.yaml
          # Confirmar que estГЎ Active antes de continuar
          kubectl wait --for=jsonpath='{.status.phase}'=Active namespace/sispardt --timeout=60s

      # в”Ђв”Ђ Secret para pull de ghcr.io desde k3s в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Crear/actualizar imagePullSecret (ghcr-cred)
        run: |
          kubectl create secret docker-registry ghcr-cred \
            --namespace=sispardt \
            --docker-server=$REGISTRY \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_PAT }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # в”Ђв”Ђ Endpoints para servicios Docker Compose en el host в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Aplicar host-services (bridge a Docker Compose)
        env:
          NODE_IP: ${{ steps.node.outputs.ip }}
        run: envsubst '${NODE_IP}' < k8s/host-services.yaml | kubectl apply -f -

      # в”Ђв”Ђ ConfigMap (configuraciГіn no sensible) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Crear/actualizar ConfigMap
        env:
          NODE_IP: ${{ steps.node.outputs.ip }}
        run: |
          kubectl create configmap sispardt-config \
            --namespace=sispardt \
            --from-literal=NODE_IP=${NODE_IP} \
            --from-literal=KEYCLOAK_ISSUER=http://${NODE_IP}:8080/realms/sispardt \
            --from-literal=KEYCLOAK_JWKS_URL=http://${NODE_IP}:8080/realms/sispardt/protocol/openid-connect/certs \
            --from-literal=KEYCLOAK_ADMIN_URL=http://${NODE_IP}:8080 \
            --from-literal=KEYCLOAK_REALM=sispardt \
            --from-literal=KEYCLOAK_CLIENT_ID_EST=sispardt-establecimientos-svc \
            --from-literal=KEYCLOAK_CLIENT_ID_MOV=sispardt-movimientos-svc \
            --from-literal=API_ESTABLECIMIENTOS_URL=http://svc-establecimientos.sispardt.svc.cluster.local:8081 \
            --from-literal=API_MOVIMIENTOS_URL=http://svc-movimientos.sispardt.svc.cluster.local:8082 \
            --from-literal=NEXTAUTH_URL=http://${NODE_IP} \
            --from-literal=AUTH_KEYCLOAK_ID=sispardt-web \
            --from-literal=AUTH_KEYCLOAK_ISSUER=http://${NODE_IP}:8080/realms/sispardt \
            --from-literal=NEXT_PUBLIC_API_BASE_URL=http://${NODE_IP} \
            --from-literal=NEXT_PUBLIC_INICIO_SISTEMA=2026-03-10 \
            --from-literal=NEXT_PUBLIC_PAIS_DEFECTO=1 \
            --from-literal=NEXT_PUBLIC_DIVISION_PRINCIPAL=1 \
            --dry-run=client -o yaml | kubectl apply -f -

      # в”Ђв”Ђ Secret (credenciales sensibles вЂ” nunca en el repositorio) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Crear/actualizar Secret
        run: |
          EST_DSN="postgresql://app_responsable_registro:${{ secrets.APP_PASS_RESP_REG }}@db-establecimientos:5432/sispardt_establecimientos?sslmode=disable"
          MOV_DSN="postgresql://app_recepcionista:${{ secrets.APP_PASS_RECEP }}@db-movimientos:5432/sispardt_movimientos?sslmode=disable"
          MOV_STATS_DSN="postgresql://app_resp_estadistica:${{ secrets.APP_PASS_ESTAD }}@db-movimientos:5432/sispardt_movimientos?sslmode=disable"
          KC_DSN="postgresql://app_admin_general:${{ secrets.APP_PASS_ADMIN }}@db-movimientos:5432/sispardt_movimientos?sslmode=disable"
          AUD_SES_DSN="postgresql://app_auditoria_sesiones:${{ secrets.APP_PASS_AUD_SES }}@db-auditoria-sesiones:5432/sispardt_auditoria_sesiones?sslmode=disable"

          kubectl create secret generic sispardt-secrets \
            --namespace=sispardt \
            --from-literal=EST_DB_DSN="${EST_DSN}" \
            --from-literal=MOV_DB_DSN="${MOV_DSN}" \
            --from-literal=MOV_DB_DSN_STATS="${MOV_STATS_DSN}" \
            --from-literal=KC_CONSUMER_DB_DSN="${KC_DSN}" \
            --from-literal=AUD_SES_DB_DSN="${AUD_SES_DSN}" \
            --from-literal=KC_SECRET_EST=${{ secrets.KC_SECRET_EST_SVC }} \
            --from-literal=KC_SECRET_MOV=${{ secrets.KC_SECRET_MOV_SVC }} \
            --from-literal=KC_SECRET_AUD=${{ secrets.KC_SECRET_AUD_SVC }} \
            --from-literal=NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }} \
            --from-literal=AUTH_KEYCLOAK_SECRET="" \
            --from-literal=DEFAULT_USER_PASSWORD=${{ secrets.DEFAULT_USER_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # в”Ђв”Ђ Deployments (imagen con sha del commit) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Aplicar Deployments
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for dir in k8s/establecimientos k8s/movimientos k8s/auditoria-sesiones k8s/frontend; do
            envsubst '${IMAGE_OWNER} ${IMAGE_TAG}' < ${dir}/deployment.yaml | kubectl apply -f -
          done

      # в”Ђв”Ђ Services e Ingress в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Aplicar Services e Ingress
        run: |
          kubectl apply -f k8s/establecimientos/service.yaml
          kubectl apply -f k8s/movimientos/service.yaml
          kubectl apply -f k8s/auditoria-sesiones/service.yaml
          kubectl apply -f k8s/frontend/service.yaml
          kubectl apply -f k8s/ingress.yaml

      # в”Ђв”Ђ Verificar rollouts в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Verificar rollouts
        id: rollouts
        run: |
          kubectl rollout status deployment/svc-establecimientos     -n sispardt --timeout=5m
          kubectl rollout status deployment/svc-movimientos          -n sispardt --timeout=5m
          kubectl rollout status deployment/svc-auditoria-sesiones   -n sispardt --timeout=5m
          kubectl rollout status deployment/svc-frontend             -n sispardt --timeout=5m

      - name: DiagnГіstico de pods fallidos
        if: failure() && steps.rollouts.conclusion == 'failure'
        run: |
          echo "=== Pods en namespace sispardt ==="
          kubectl get pods -n sispardt -o wide
          for dep in svc-establecimientos svc-movimientos svc-auditoria-sesiones svc-frontend; do
            echo ""
            echo "=== describe deployment/$dep ==="
            kubectl describe deployment/$dep -n sispardt 2>/dev/null || true
            echo ""
            echo "=== logs $dep (Гєltimo pod) ==="
            POD=$(kubectl get pods -n sispardt -l app=$dep --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || true)
            if [ -n "$POD" ]; then
              kubectl logs "$POD" -n sispardt --tail=80 2>&1 || true
              echo "--- previous (si existe) ---"
              kubectl logs "$POD" -n sispardt --previous --tail=40 2>&1 || true
            else
              echo "(no se encontrГі pod para $dep)"
            fi
          done

      # в”Ђв”Ђ Smoke Test вЂ” validaciГіn HTTP post-deploy в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: "Smoke Test В· Validar endpoints crГ­ticos"
        env:
          NODE_IP: ${{ steps.node.outputs.ip }}
        run: |
          echo "Esperando que los pods estГ©n listos para recibir trГЎfico..."
          sleep 10

          check() {
            local name=$1 url=$2 expected=$3
            echo -n "  в†’ $name ($url): "
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
            if [ "$STATUS" = "$expected" ]; then
              echo "HTTP $STATUS вњ“"
            else
              echo "HTTP $STATUS вњ— (esperado $expected)"
              exit 1
            fi
          }

          # Microservicio establecimientos вЂ” endpoint de salud
          check "svc-establecimientos /health"   "http://${NODE_IP}:30081/health" "200"
          # Microservicio movimientos вЂ” endpoint de salud
          check "svc-movimientos /health"        "http://${NODE_IP}:30082/health" "200"
          # Microservicio auditoria-sesiones вЂ” endpoint de salud
          check "svc-auditoria-sesiones /health" "http://${NODE_IP}:30084/health" "200"
          # Frontend вЂ” pГЎgina principal (responde 200 o 307 redirect)
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 "http://${NODE_IP}" || echo "000")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "302" ]; then
            echo "  в†’ frontend (http://${NODE_IP}): HTTP $STATUS вњ“"
          else
            echo "  в†’ frontend (http://${NODE_IP}): HTTP $STATUS вњ—"
            exit 1
          fi

          echo "Smoke Test completado вЂ” todos los endpoints responden correctamente."

      - name: Resumen del deploy
        if: always()
        run: |
          echo "=== Pods en namespace sispardt ==="
          kubectl get pods -n sispardt
          echo ""
          echo "=== Services ==="
          kubectl get svc -n sispardt
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n sispardt

  # в”Ђв”Ђв”Ђ 7. DAST вЂ” OWASP ZAP Baseline в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  dast:
    name: "Security В· DAST (OWASP ZAP Baseline)"
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: self-hosted

    steps:
      - name: Obtener IP del nodo
        id: node
        run: |
          IP=$(kubectl get nodes \
            -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' \
            | tr ' ' '\n' | grep -E '^[0-9]+\.' | head -1)
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "Node IP detectada: $IP"

      - name: Preparar directorio de reportes
        run: |
          mkdir -p /tmp/zap-reports
          chmod 777 /tmp/zap-reports

      # в”Ђв”Ђ ZAP Baseline вЂ” Frontend в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # zap-baseline.py: escaneo pasivo + reglas de alerta sin ataque activo
      # -I: no fallar en WARN (Medium), sГіlo en FAIL (High/Critical)
      # -r: reporte HTML  -J: reporte JSON
      - name: "DAST В· ZAP Baseline вЂ” Frontend"
        env:
          NODE_IP: ${{ steps.node.outputs.ip }}
        run: |
          docker run --rm \
            --network host \
            -v /tmp/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "http://${NODE_IP}" \
              -r zap-frontend.html \
              -J zap-frontend.json \
              -I

      # в”Ђв”Ђ ZAP Baseline вЂ” API Establecimientos в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: "DAST В· ZAP Baseline вЂ” API Establecimientos"
        env:
          NODE_IP: ${{ steps.node.outputs.ip }}
        run: |
          docker run --rm \
            --network host \
            -v /tmp/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "http://${NODE_IP}:30081" \
              -r zap-establecimientos.html \
              -J zap-establecimientos.json \
              -I

      # в”Ђв”Ђ ZAP Baseline вЂ” API Movimientos в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: "DAST В· ZAP Baseline вЂ” API Movimientos"
        env:
          NODE_IP: ${{ steps.node.outputs.ip }}
        run: |
          docker run --rm \
            --network host \
            -v /tmp/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "http://${NODE_IP}:30082" \
              -r zap-movimientos.html \
              -J zap-movimientos.json \
              -I

      # в”Ђв”Ђ ZAP Baseline вЂ” API Auditoria Sesiones в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: "DAST В· ZAP Baseline вЂ” API Auditoria Sesiones"
        env:
          NODE_IP: ${{ steps.node.outputs.ip }}
        run: |
          docker run --rm \
            --network host \
            -v /tmp/zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "http://${NODE_IP}:30084" \
              -r zap-auditoria-sesiones.html \
              -J zap-auditoria-sesiones.json \
              -I

      # в”Ђв”Ђ Subir reportes como artefacto (siempre, incluso si ZAP falla) в”Ђв”Ђв”Ђв”Ђ
      - name: Subir reportes DAST
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-reports-${{ github.sha }}
          path: /tmp/zap-reports/
          retention-days: 30
