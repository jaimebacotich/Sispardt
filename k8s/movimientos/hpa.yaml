apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: svc-movimientos
  namespace: sispardt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: svc-movimientos
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
